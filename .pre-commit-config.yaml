default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: check-added-large-files
          - id: check-json
            exclude: tsconfig.*\.json$|frontend/apps/demo/public/
          - id: check-merge-conflict
          - id: check-toml
          - id: check-yaml
          - id: end-of-file-fixer
            stages: [pre-commit]
            exclude: ^frontend/apps/demo/public/
          - id: trailing-whitespace
            stages: [pre-commit]
            exclude: ^frontend/apps/demo/public/
          - id: mixed-line-ending
            args: [--fix=lf]
            files: \.(bash|sh)$

    # ruff walks up from each file to find api/ruff.toml automatically
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.8
      hooks:
          - id: ruff-check
            files: ^api/
          - id: ruff-format
            files: ^api/

    # Local hooks cd into subdirectories and strip the prefix from
    # file arguments so tools see project-relative paths.
    - repo: local
      hooks:
          - id: uv-lock
            name: uv-lock
            entry: uv lock
            language: system
            files: (^|api/)pyproject\.toml$|^uv\.lock$
            pass_filenames: false

          # Upstream (#214) paused pyright; the fork keeps it active but
          # adopts upstream's pre-push staging for type-checks.
          # Keep this hook unfiltered: it checks the full API tree and must run
          # even when a push contains only non-Python changes.
          - id: pyright
            name: pyright
            entry: uv --directory api run --group lint pyright
            language: system
            pass_filenames: false
            stages: [pre-push]

          - id: frontend-eslint
            name: frontend-eslint
            entry: uv run python hzdr/scripts/run_frontend_hook.py eslint
            language: system
            files: ^frontend/
            exclude: ^frontend/apps/demo/public/
            types_or: [javascript, jsx, ts, tsx]

          - id: frontend-prettier
            name: frontend-prettier
            entry: uv run python hzdr/scripts/run_frontend_hook.py prettier
            language: system
            files: ^frontend/
            exclude: ^frontend/apps/demo/public/
            types_or: [javascript, jsx, ts, tsx, json, html, css, markdown]

          - id: frontend-tsc
            name: frontend-tsc
            entry: uv run python hzdr/scripts/run_frontend_hook.py tsc
            language: system
            files: ^frontend/
            types_or: [ts, tsx]
            pass_filenames: false
            stages: [pre-push]
